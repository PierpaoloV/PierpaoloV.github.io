  page-footer:
    left: "© 2026 Pierpaolo Vendittelli"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    include-in-header:
      - text: |
          <script>
          (function () {
            // Quarto uses 'alternate' for dark, 'default' for light
            var stored = localStorage.getItem('quarto-color-scheme');
            if (!stored) {
              localStorage.setItem('quarto-color-scheme', 'alternate');
            }
            // Add class to <html> immediately to avoid flash before body script runs
            if ((stored || 'alternate') === 'alternate') {
              document.documentElement.classList.add('quarto-dark');
            }
          })();
          </script>
    toc: false
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
