project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - cv.qmd
    - publications.qmd
    - projects.qmd
    - learning.qmd
  resources:
    - robots.txt

website:
  title: "Pierpaolo Vendittelli"
  site-url: https://pierpaolov.github.io
  repo-url: https://github.com/PierpaoloV/PierpaoloV.github.io
  favicon: assets/logo.png
  search: true
  open-graph: true
  twitter-card: true
  navbar:
    logo: assets/logo.png
    left:
      - href: index.qmd
        text: Home
      - href: cv.qmd
        text: CV
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: learning.qmd
        text: Learning

  google-analytics: "G-7EYEDKW974"

  page-footer:
    left: "© 2026 Pierpaolo Vendittelli"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    canonical-url: true
    include-in-header:
      - text: |
          <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
          <link rel="me" href="https://github.com/PierpaoloV">
          <link rel="me" href="https://www.linkedin.com/in/pierpaolo-vendittelli">
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
          <script>
          (function () {
            var stored = localStorage.getItem('quarto-color-scheme');
            if (!stored) {
              localStorage.setItem('quarto-color-scheme', 'alternate');
            }
            if ((stored || 'alternate') === 'alternate') {
              document.documentElement.setAttribute('data-bs-theme', 'dark');
            }
          })();
          </script>
    toc: false
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
