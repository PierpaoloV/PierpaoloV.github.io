project:
  type: website
  output-dir: _site

website:
  title: "Pierpaolo Vendittelli"
  favicon: assets/logo.png
  search: true
  navbar:
    logo: assets/logo.png
    left:
      - href: index.qmd
        text: Home
      - href: cv.qmd
        text: CV
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: learning.qmd
        text: Learning
    right:
      - icon: github
        href: https://github.com/PierpaoloV
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/pierpaolo-vendittelli-66258414a/
        aria-label: LinkedIn
      - icon: envelope
        href: "mailto:pierpaolovendittelli.93@gmail.com"
        aria-label: Email

  page-footer:
    left: "© 2026 Pierpaolo Vendittelli"
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
          <script>
          (function () {
            var stored = localStorage.getItem('quarto-color-scheme');
            if (!stored) {
              localStorage.setItem('quarto-color-scheme', 'alternate');
            }
            if ((stored || 'alternate') === 'alternate') {
              document.documentElement.setAttribute('data-bs-theme', 'dark');
            }
          })();
          </script>
    toc: false
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
